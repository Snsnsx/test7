<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сайт временно недоступен</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }


    .banner {
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      padding: 14px 0;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4);
    }


    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
    }

    .content {
      max-width: 640px;
    }

    .gear {
      font-size: 6.5rem;
      margin-bottom: 1.5rem;
      animation: spin 18s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: clamp(42px, 7vw, 68px);
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #c4d0ff, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.35rem;
      color: #94a3b8;
      max-width: 520px;
      margin: 0 auto 3rem;
    }

    .btn {
      display: inline-block;
      background: #ffffff;
      color: #0f172a;
      padding: 16px 36px;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1.05rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #fcd34d;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(251, 191, 36, 0.3);
    }

    /* Подвал */
    footer {
      padding: 2rem 1rem;
      text-align: center;
      color: #64748b;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>


  <!-- ГЛАВНЫЙ КОНТЕНТ -->
  <div class="main">
    <div class="content">
      <div class="gear">⚙️</div>
      <h1>Проведение работ завершено.</h1>
      <p>
        Для разъяснения результатов и разбора заданий обратитесь к учителю.<br>
      </p>
      
      <a href="#" class="btn">Жмать кнопку?</a>
    </div>
  </div>

  <footer>

  </footer>
</body>
</html>
